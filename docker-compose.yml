services:
  db:
    image: postgres:16
    container_name: policlinica_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: policlinica
      POSTGRES_PASSWORD: policlinica_secret
      POSTGRES_DB: policlinica
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: